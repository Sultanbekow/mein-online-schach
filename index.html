<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Klassisches Online-Schachspiel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3e5ab; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #b58863; margin-bottom: 5px; }
        #status { font-weight: bold; color: #333; margin-bottom: 20px; }
        .game-container { display: flex; justify-content: center; align-items: flex-start; gap: 30px; margin-top: 10px; }
        #board { display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 4px solid #b58863; }
        .cell { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 45px; cursor: pointer; user-select: none; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { background-color: #d4a373 !important; }
        .sidebar { background: #e6ccb2; padding: 20px; border-radius: 8px; border: 2px solid #b58863; display: flex; flex-direction: column; gap: 12px; }
        button { font-size: 14px; font-weight: bold; padding: 12px 20px; background: #f0d9b5; border: 2px solid #b58863; border-radius: 4px; cursor: pointer; transition: 0.2s; width: 180px; }
        button:hover { background: #ddb892; }
    </style>
</head>
<body>

    <h1>Klassisches Online-Schachspiel</h1>
    <div id="status">Verbinde mit Server...</div>

    <div class="game-container">
        <!-- Schachbrett -->
        <div id="board"></div>

        <!-- Steuerung rechts -->
        <div class="sidebar">
            <h3 style="margin: 0 0 10px 0; color: #333;">Optionen</h3>
            <button onclick="sendCmd('RESIGN')">🏳  Aufgeben</button>
            <button onclick="sendCmd('DRAW_REQUEST')">🤝  Remis anbieten</button>
            <button onclick="sendCmd('UNDO_REQUEST')">↩  Zug zurücknehmen</button>
        </div>
    </div>

    <script>
        let ws;
        let myColor = null;
        let selectedSquare = null;
        
        // Startaufstellung der Figuren (Unicode)
        const initialBoard = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        
        const symbols = {
            'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟',
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟'
        };

        const boardDiv = document.getElementById('board');
        const statusDiv = document.getElementById('status');

        // WebSocket-Verbindung aufbauen (Nutzt die Brücke des C++ Servers)
        // HINWEIS: Für ein echtes Online-Spiel muss "localhost" durch die öffentliche IP Ihres Servers ersetzt werden.
        ws = new WebSocket("ws://localhost:8080");

        ws.onopen = () => { statusDiv.innerText = "Verbunden! Warte auf Zuweisung der Farbe..."; };
        ws.onmessage = (event) => {
            let data = event.data;
            if (data.startsWith("COLOR:")) {
                myColor = data.split(":")[1];
                statusDiv.innerText = `Spiel läuft. Du bist Spieler: ${myColor === 'W' ? 'WEISS' : 'SCHWARZ'}`;
            }
            // Hier folgt die Erweiterung für die Zug-Logik über das Netz...
        };

        // Spielfeld generieren
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                const piece = initialBoard[r][c];
                cell.innerText = piece ? symbols[piece] : '';
                if(piece) cell.style.color = piece === piece.toUpperCase() ? '#fff' : '#000'; // Weiße Figuren weiß färben
                
                cell.onclick = () => handleCellClick(r, c, cell);
                boardDiv.appendChild(cell);
            }
        }

        function handleCellClick(r, c, element) {
            // Einfache visuelle Auswahl
            if (selectedSquare) selectedSquare.classList.remove('selected');
            selectedSquare = element;
            element.classList.add('selected');
        }

        function sendCmd(cmd) {
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(`CMD:${cmd}`);
            }
        }
    </script>
</body>
</html>
